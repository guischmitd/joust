repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint (+ isort)
        entry: poetry run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: poetry run ruff format
        language: system
        types: [python]

      - id: pytest
        name: pytest
        entry: poetry run pytest --tb=short -q
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
